services:
  web:
    build: .
    entrypoint: ["/app/entrypoint.sh"]
    command: ["gunicorn", "hotel_booking.wsgi:application", "--bind", "0.0.0.0:8000", "--timeout", "120", "--workers", "4"]
    working_dir: /app/hotel_booking
    volumes:
      - static_volume:/app/hotel_booking/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
      - ./entrypoint.sh:/app/entrypoint.sh
      - .:/app:cached  
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=hotel_booking.deployment
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=hotelMaarDB
      - POSTGRES_USER=hotelapi_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    restart: unless-stopped
    networks:
      - app-network
    # Removed port exposure for security - database only accessible internally
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotelapi_user -d hotelMaarDB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    build: .
    command: celery -A hotel_booking worker -l info --concurrency=4 --max-tasks-per-child=1000
    working_dir: /app/hotel_booking
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=hotel_booking.deployment
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    # Celery worker doesn't expose ports
    healthcheck:
      test: ["CMD", "celery", "-A", "hotel_booking", "inspect", "active"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  celery_beat:
    build: .
    command: celery -A hotel_booking beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    working_dir: /app/hotel_booking
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=hotel_booking.deployment
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  logs_volume:

networks:
  app-network:
    driver: bridge
