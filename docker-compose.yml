services:
  web:
    build: .
    command: >
      sh -c "cd /app/hotel_booking &&
             python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn hotel_booking.wsgi:application --bind 0.0.0.0:8000 --timeout 120 --workers 2"
    working_dir: /app
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=hotel_booking.deployment
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=hotelMaarDB
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=MaarHBE@135$
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d hotelMaarDB"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
