# Apache Reverse Proxy Configuration for Hotel Booking Engine
# 
# Installation:
# 1. Copy this file to: /etc/httpd/conf.d/hotel-booking.conf
#    or: /etc/apache2/sites-available/hotel-booking.conf
#
# 2. Enable required modules:
#    a2enmod proxy
#    a2enmod proxy_http
#    a2enmod rewrite
#    a2enmod headers
#    a2enmod ssl
#
# 3. Enable the site (Debian/Ubuntu):
#    a2ensite hotel-booking.conf
#
# 4. Test configuration:
#    apachectl configtest
#    or
#    apache2ctl configtest
#
# 5. Restart Apache:
#    systemctl restart httpd   (AlmaLinux/CentOS/RHEL)
#    systemctl restart apache2 (Debian/Ubuntu)

# ==============================================================================
# HTTP to HTTPS Redirect (Port 80)
# ==============================================================================
<VirtualHost *:80>
    ServerName marhotels.com.sa
    ServerAlias www.marhotels.com.sa
    
    # Redirect all HTTP traffic to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
    
    # Allow Let's Encrypt ACME challenge
    ProxyPass /.well-known !
    <Directory /var/www/letsencrypt/.well-known>
        Allow from all
    </Directory>
</VirtualHost>

# ==============================================================================
# HTTPS Configuration (Port 443)
# ==============================================================================
<VirtualHost *:443>
    ServerName marhotels.com.sa
    ServerAlias www.marhotels.com.sa
    
    # Admin contact for server errors
    ServerAdmin admin@marhotels.com.sa
    
    # ==== SSL Certificate Configuration ====
    # For Let's Encrypt (recommended)
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/marhotels.com.sa/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/marhotels.com.sa/privkey.pem
    SSLCertificateChainFile /etc/letsencrypt/live/marhotels.com.sa/chain.pem
    
    # SSL Protocol and Cipher Configuration
    SSLProtocol -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
    SSLHonorCipherOrder on
    
    # ==== Security Headers ====
    # Strict-Transport-Security (HSTS)
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    
    # Content Security Policy
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;"
    
    # X-Frame-Options (Clickjacking protection)
    Header always set X-Frame-Options "DENY"
    
    # X-Content-Type-Options (MIME type sniffing protection)
    Header always set X-Content-Type-Options "nosniff"
    
    # X-XSS-Protection (XSS protection)
    Header always set X-XSS-Protection "1; mode=block"
    
    # Referrer-Policy
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    
    # Permissions-Policy (Feature policy)
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    
    # Add Vary header for caching
    Header always set Vary "Accept-Encoding"
    
    # ==== Logging ====
    ErrorLog /var/log/httpd/hotel-booking-error.log
    CustomLog /var/log/httpd/hotel-booking-access.log combined
    
    # ==== Proxy Configuration ====
    # Enable proxy modules
    ProxyPreserveHost On
    ProxyRequests Off
    
    # Connection timeout configuration
    ProxyTimeout 300
    ProxyConnectTimeout 300
    ProxyReceiveBufferSize 4096
    
    # Main API proxy
    <Location / >
        ProxyPass http://127.0.0.1:8000/
        ProxyPassReverse http://127.0.0.1:8000/
        
        # Allow all traffic
        Allow from all
    </Location>
    
    # ==== Static Files (Optional - if serving directly) ====
    # Uncomment if you want Apache to serve static files
    # <Location /static/ >
    #     ProxyPass !
    #     Alias /static/ /app/hotel_booking/staticfiles/
    #     
    #     <Directory /app/hotel_booking/staticfiles>
    #         Require all granted
    #         ExpiresActive On
    #         ExpiresDefault "access plus 1 month"
    #     </Directory>
    # </Location>
    
    # ==== Media Files (Optional - for uploaded content) ====
    # <Location /media/ >
    #     ProxyPass !
    #     Alias /media/ /app/media/
    #     
    #     <Directory /app/media>
    #         Require all granted
    #         ExpiresActive On
    #         ExpiresDefault "access plus 1 day"
    #     </Directory>
    # </Location>
    
    # ==== Caching Configuration ====
    # Enable caching for static assets
    <FilesMatch "\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2)$">
        ExpiresActive On
        ExpiresDefault "access plus 1 month"
        Header append Cache-Control "public, immutable"
    </FilesMatch>
    
    # Cache API responses (optional, be careful with this)
    <Location /api/v1/ >
        Header set Cache-Control "no-cache, no-store, must-revalidate"
    </Location>
    
    # ==== Compression ====
    # Enable gzip compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json application/xml+rss font/opentype font/truetype
        
        # Exclude already compressed files
        SetEnvIfNoCase Request_URI \.(?:gif|jpe?g|png|zip|gz|bz2)$ no-gzip dont-vary
    </IfModule>
    
    # ==== URL Rewriting ====
    <IfModule mod_rewrite.c>
        RewriteEngine On
        
        # Preserve HTTPS
        RewriteCond %{HTTP:X-Forwarded-Proto} !https
        RewriteCond %{HTTPS} off
        RewriteRule ^ - [E=protossl:+]
        RequestHeader set X-Forwarded-Proto expression "%{ENV:protossl}s"
        
        # Add trailing slash for directory requests
        # RewriteCond %{REQUEST_FILENAME} !-f
        # RewriteCond %{REQUEST_FILENAME} !-d
        # RewriteRule ^(.*[^/])$ /$1/ [L,R=301]
    </IfModule>
    
    # ==== Custom Error Pages (Optional) ====
    # ErrorDocument 404 /api/v1/404/
    # ErrorDocument 500 /api/v1/500/
    # ErrorDocument 503 /api/v1/503/
    
    # ==== Health Check Endpoint ====
    # This is proxied to Django app
    <Location /api/v1/health/ >
        ProxyPass http://127.0.0.1:8000/api/v1/health/
        ProxyPassReverse http://127.0.0.1:8000/api/v1/health/
        
        # Don't require authentication for health checks
        Satisfy Any
        Allow from all
    </Location>
</VirtualHost>

# ==============================================================================
