# </VirtualHost>

# ==============================================================================
# Notes and Best Practices
# ==============================================================================
#
# 1. SSL Certificates:
#    - Use Let's Encrypt for free certificates
#    - Auto-renewal with certbot
#    - Command: certbot certonly --apache -d marhotels.com.sa -d www.marhotels.com.sa
#
# 2. Performance Optimization:
#    - Enable compression (mod_deflate)
#    - Set appropriate cache headers
#    - Use CDN for static assets (optional)
#
# 3. Security:
#    - Keep modules and Apache updated
#    - Monitor logs regularly
#    - Implement rate limiting if needed
#
# 4. Monitoring:
#    - Check error logs: tail -f /var/log/httpd/hotel-booking-error.log
#    - Check access logs: tail -f /var/log/httpd/hotel-booking-access.log
#    - Monitor Docker containers: docker-compose ps
#
# 5. Troubleshooting:
#    - Verify proxy is working: curl -I http://127.0.0.1:8000/api/v1/health/
#    - Check Apache logs for proxy errors
#    - Verify firewall allows traffic to port 8000
#    - Check Django app is running: docker-compose ps web
