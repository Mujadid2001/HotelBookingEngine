# Acts as reverse proxy with SSL/TLS support for both development and production

upstream gunicorn {
    server web:8000;
    keepalive 32;
}

# HTTP Server - Redirect to HTTPS in production
server {
    listen 80;
    listen [::]:80;
    server_name _;
    
    client_max_body_size 100M;
    
    # ACME challenge for Let's Encrypt (production)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Health check on HTTP (for load balancers)
    location /health/ {
        proxy_pass http://gunicorn;
        proxy_set_header Host $host;
        access_log off;
    }
    
    # Static files with caching
    location /static/ {
        alias /app/hotel_booking/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header ETag "";
    }
    
    # Media files with caching
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # In production with USE_HTTPS=true, redirect HTTP to HTTPS
    # This will be handled by Django settings (SECURE_SSL_REDIRECT)
    # But we can also do it here for immediate redirect
    location / {
        # Only redirect if USE_HTTPS environment is set
        # For now, serve both HTTP and HTTPS
        proxy_pass http://gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_redirect off;
        
        # Connection settings
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}

# HTTPS Server - Production configuration
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;
    
    # SSL Configuration - Best Practices for 2026
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    # SSL Protocols - Only TLS 1.2+ for security
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # Strong cipher suites - Modern and legacy support
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    
    # SSL Session Configuration
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # HSTS (Strict-Transport-Security) - Tell browsers to use HTTPS only
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # CSP - Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
    
    client_max_body_size 100M;
    
    # API endpoints
    location /api/ {
        proxy_pass http://gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_redirect off;
        
        # Connection settings
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
    
    # Manager interface
    location /manager/ {
        proxy_pass http://gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_redirect off;
        
        # Connection settings
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
    
    # Static files with caching
    location /static/ {
        alias /app/hotel_booking/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header ETag "";
    }
    
    # Media files with caching
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Health check endpoint
    location /health/ {
        proxy_pass http://gunicorn;
        proxy_set_header Host $host;
        access_log off;
    }
    
    # Root redirect
    location = / {
        return 301 /api/v1/;
    }
    
    # Admin interface
    location /admin/ {
        proxy_pass http://gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_redirect off;
    }
    
    # Catch-all - proxy to Django
    location / {
        proxy_pass http://gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_redirect off;
        
        # Connection settings
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
    
    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
