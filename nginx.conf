# Nginx configuration for Django API reverse proxy
# Place this file at /etc/nginx/conf.d/hotel_booking.conf on your server

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optionally serve static files directly (if collected to /app/hotel_booking/staticfiles)
    location /static/ {
        alias /app/hotel_booking/staticfiles/;
    }
    location /media/ {
        alias /app/hotel_booking/media/;
    }
}
